<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Style Voice Recorder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #efeae2; /* WhatsApp chat background color */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-bar {
            background-color: #f0f2f5;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        .recorder-status {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            font-size: 15px;
            color: #667781;
        }

        /* The live blinking recording indicator */
        .dot {
            width: 10px;
            height: 10px;
            background-color: #ea0038;
            border-radius: 50%;
            display: none;
        }

        .dot.active {
            display: inline-block;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.3; transform: scale(1.2); }
        }

        .timer {
            font-weight: 500;
            display: none;
        }

        .timer.active {
            display: inline-block;
            color: #111b21;
        }

        /* Audio Preview Container */
        #audioPreview {
            display: none;
            flex-grow: 1;
            height: 36px;
            border-radius: 20px;
        }

        /* Record Button styling */
        .mic-btn {
            background-color: #00a884; /* WhatsApp Green */
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: background-color 0.2s, transform 0.1s;
            outline: none;
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .mic-btn.recording {
            background-color: #ea0038; /* Red when active */
        }
    </style>
</head>
<body>

    <div class="chat-bar">
        <div class="recorder-status">
            <span id="recordDot" class="dot"></span>
            <span id="timer" class="timer">00:00</span>
            <span id="statusText">Click mic to record</span>
            <audio id="audioPreview" controls></audio>
        </div>

        <button id="micBtn" class="mic-btn">🎙️</button>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const recordDot = document.getElementById('recordDot');
        const timerLabel = document.getElementById('timer');
        const statusText = document.getElementById('statusText');
        const audioPreview = document.getElementById('audioPreview');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let timerInterval;
        let secondsElapsed = 0;

        micBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // 1. Request microphone access and start recording
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        // Create a single audio blob from the recorded chunks
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        
                        // Show preview player
                        audioPreview.src = audioUrl;
                        audioPreview.style.display = 'block';
                        statusText.style.display = 'none';
                    };

                    mediaRecorder.start();
                    
                    // Update UI states
                    isRecording = true;
                    micBtn.classList.add('recording');
                    micBtn.textContent = '⏹️'; // Change icon to stop
                    recordDot.classList.add('active');
                    timerLabel.classList.add('active');
                    audioPreview.style.display = 'none';
                    statusText.style.display = 'inline';
                    statusText.textContent = 'Recording...';
                    
                    // Start Timer
                    secondsElapsed = 0;
                    timerLabel.textContent = "00:00";
                    timerInterval = setInterval(updateTimer, 1000);

                } catch (err) {
                    alert('Microphone access denied or not supported: ' + err.message);
                }
            } else {
                // 2. Stop the recording
                mediaRecorder.stop();
                // Stop the microphone hardware stream completely to save battery/privacy
                mediaRecorder.stream.getTracks().forEach(track => track.stop());

                // Reset UI states
                isRecording = false;
                micBtn.classList.remove('recording');
                micBtn.textContent = '🎙️';
                recordDot.classList.remove('active');
                timerLabel.classList.remove('active');
                clearInterval(timerInterval);
            }
        });

        // Helper function to format and update the timer string
        function updateTimer() {
            secondsElapsed++;
            const mins = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
            const secs = String(secondsElapsed % 60).padStart(2, '0');
            timerLabel.textContent = `${mins}:${secs}`;
        }
    </script>

</body>
</html>
